name: Auto-Update Pokemon Database

on:
  schedule:
    # Runs at 00:00 every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the updated database back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run build script
        run: python build_db.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "modified=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add database.js
          git commit -m "Auto-update TCG Database"
          git push
